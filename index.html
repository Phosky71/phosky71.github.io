<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impostor Party — Importar grupo</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .emoji { font-size: 72px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p  { color: #aaa; margin-bottom: 24px; max-width: 300px; }
    .btn {
      background: #6c63ff;
      color: #fff;
      padding: 16px 32px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      display: inline-block;
      margin-bottom: 12px;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 12px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 14px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="emoji">🎭</div>
  <h1>Impostor Party</h1>
  <p id="msg">Abriendo la app…</p>

  <a id="open-btn" href="#" class="btn" style="display:none">
    Abrir en Impostor Party
  </a>
  <br>
  <a id="store-btn"
     href="https://play.google.com/store/apps/details?id=com.phosky.impostorpersonalizadof"
     class="btn-secondary" style="display:none">
    Descargar la app
  </a>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const data     = params.get('data');
    const pkg      = 'com.phosky.impostorpersonalizadof';
    const storeUrl = 'https://play.google.com/store/apps/details?id=' + pkg;

    if (!data) {
      document.getElementById('msg').textContent = 'Enlace no válido.';
    } else {

      // ── URL schemes ────────────────────────────────────────────
      // Custom scheme — funciona siempre si la app está instalada
      const customUrl = 'impostorapp://?data=' + encodeURIComponent(data);

      // intent:// — fuerza apertura desde WebViews (WhatsApp, Instagram…)
      const intentUrl = 'intent://?data=' + encodeURIComponent(data)
        + '#Intent;scheme=impostorapp;package=' + pkg + ';'
        + 'S.browser_fallback_url=' + encodeURIComponent(storeUrl) + ';end';

      function isWebView() {
        const ua = navigator.userAgent;
        return /wv|WebView/i.test(ua)
          || /FBAN|FBAV|Instagram/i.test(ua)
          || document.referrer.includes('android-app://com.whatsapp')
          || document.referrer.includes('android-app://org.telegram');
      }

      function tryOpen() {
        if (isWebView()) {
          // WebView de WhatsApp/Instagram → intent:// es el único que funciona
          window.location = intentUrl;
        } else {
          // Chrome/Firefox → custom scheme directo
          window.location = customUrl;
        }

        // Si tras 2.5s no se ha ido → app no instalada
        setTimeout(() => {
          document.getElementById('msg').textContent =
            '¿No tienes la app instalada?';
          document.getElementById('open-btn').style.display = 'none';
          document.getElementById('store-btn').style.display = 'inline-block';
        }, 2500);
      }

      // Mostrar botón manual por si el auto-open falla
      const btn = document.getElementById('open-btn');
      btn.style.display = 'inline-block';
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        tryOpen();
      });

      // Intento automático al cargar
      tryOpen();
    }
  </script>
</body>
</html>
