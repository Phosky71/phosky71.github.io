<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impostor Party — Importar grupo</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .emoji { font-size: 72px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p  { color: #aaa; margin-bottom: 24px; }
    a  {
      background: #6c63ff;
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="emoji">🎭</div>
  <h1>Impostor Party</h1>
  <p id="msg">Abriendo la aplicación...</p>
  <a id="store-btn" href="#" style="display:none">
    Descargar Impostor Party
  </a>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const data    = params.get('data');
    const storeUrl = 'https://play.google.com/store/apps/details?id=com.tuempresa.impostorparty';

    if (data) {
      // Intentar abrir la app con el scheme custom como fallback
      window.location = 'impostorapp://grupo?data=' + encodeURIComponent(data);

      // Si tras 2.5s no se ha abierto la app → mostrar botón de descarga
      setTimeout(() => {
        document.getElementById('msg').textContent =
          '¿No tienes la app instalada?';
        const btn = document.getElementById('store-btn');
        btn.href = storeUrl;
        btn.style.display = 'inline-block';
      }, 2500);
    } else {
      document.getElementById('msg').textContent =
        'Enlace no válido. Pide al remitente que lo reenvíe.';
    }
  </script>
</body>
</html>
